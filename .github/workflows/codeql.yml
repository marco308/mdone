name: "CodeQL"

# Advanced CodeQL setup. The Swift code has no committed .xcodeproj — it is
# generated by XcodeGen — so CodeQL's default-setup autobuild fails with
# "No Xcode project or workspace found". This workflow runs `xcodegen generate`
# before building so CodeQL can observe a real compilation.
#
# NOTE: enabling this advanced workflow requires turning OFF CodeQL "Default
# setup" for the repo (Settings > Security > Code scanning), otherwise the two
# configurations conflict. The `actions` language is included here so disabling
# default setup does not lose the (already-passing) Actions analysis.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            runner: ubuntu-latest
          - language: swift
            build-mode: manual
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Xcode project
        if: matrix.language == 'swift'
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Swift
        if: matrix.build-mode == 'manual'
        run: |
          xcodebuild \
            -project mDone.xcodeproj \
            -scheme mDone \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
