name: iOS Tests

# Runs the unit-test bundle (mDoneTests) on every PR. The .xcodeproj is
# generated by XcodeGen and not committed, so generate it first — same as
# the CodeQL workflow. UI/snapshot test targets are excluded: they need a
# booted app and are too flaky for CI.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests (iOS Simulator)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Run unit tests
        run: |
          xcodebuild \
            -project mDone.xcodeproj \
            -scheme mDone \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -only-testing:mDoneTests \
            test
