name: mDone
options:
  bundleIdPrefix: com.mdone
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    # Xcode 26.5 + XcodeGen 2.45.4 no longer inject a default PRODUCT_NAME, so
    # swiftc gets `-module-name ` (empty) and every target fails with
    # "module name "" is not a valid identifier". Pin it to the target name
    # (the historical XcodeGen default) so all schemes build. Build-infra fix,
    # not feature-related — see PR "decisions".
    PRODUCT_NAME: "$(TARGET_NAME)"
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.3.1"
    CURRENT_PROJECT_VERSION: "35"
    DEVELOPMENT_TEAM: "Z62E7MGREE"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
  configs:
    Debug:
      # Same XcodeGen 2.45.4 regression: the historical Debug default of
      # ENABLE_TESTABILITY=YES is no longer emitted, so the app module is
      # built without -enable-testing and every `@testable import mDone`
      # test fails to resolve the module. Pin it for Debug. Build-infra fix.
      ENABLE_TESTABILITY: "YES"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

targets:
  mDone:
    type: application
    platform: iOS
    sources:
      - mDone
      - mDoneShared
    dependencies:
      - target: mDoneWidgets
        embed: true
    settings:
      base:
        INFOPLIST_FILE: mDone/Info.plist
        CODE_SIGN_ENTITLEMENTS: mDone/mDone.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.mdone.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        # XcodeGen 2.45.4 stopped emitting an iOS SDKROOT for app targets
        # (used to be inferred when `options.xcodeVersion` was current), so
        # the build system was treating this target as macOS-only and no
        # simulator destinations resolved. Pin it explicitly.
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
    postBuildScripts:
      - script: |
          if which swiftlint > /dev/null; then
            swiftlint lint --quiet
          else
            echo "warning: SwiftLint not installed"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false
    scheme:
      testTargets:
        - mDoneTests
        - mDoneUITests
      gatherCoverageData: true

  mDone-macOS:
    type: application
    platform: macOS
    sources:
      - mDone
      - mDoneShared
    settings:
      base:
        INFOPLIST_FILE: mDone/Info.plist
        CODE_SIGN_ENTITLEMENTS: mDone/mDone-macOS.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.mdone.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        SUPPORTS_MACCATALYST: "NO"
    postBuildScripts:
      - script: |
          if which swiftlint > /dev/null; then
            swiftlint lint --quiet
          else
            echo "warning: SwiftLint not installed"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false
    scheme:
      testTargets:
        - mDoneMacUITests
      gatherCoverageData: true

  mDoneMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - mDoneMacUITests
    dependencies:
      - target: mDone-macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mdone.app.macuitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: mDone-macOS

  mDoneWidgets:
    type: app-extension
    platform: iOS
    sources:
      - mDoneWidgets
      - mDoneShared
    info:
      path: mDoneWidgets/Info.plist
      properties:
        CFBundleDisplayName: mDone Focus
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mdone.app.widgets
        CODE_SIGN_ENTITLEMENTS: mDoneWidgets/mDoneWidgets.entitlements

  mDoneTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - mDoneTests
    dependencies:
      - target: mDone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mdone.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/mDone.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/mDone"
        BUNDLE_LOADER: "$(TEST_HOST)"

  mDoneUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - mDoneUITests
    dependencies:
      - target: mDone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mdone.app.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: mDone
